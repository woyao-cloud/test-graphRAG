# GraphRAG-KG Fast Configuration
# Optimized for quick iterations and cost efficiency.
# Uses smaller chunks, fewer gleanings, and cheaper models.

kg:
  project_name: "graphrag-fast"
  description: "Fast indexing profile for quick iterations"

  ingestion:
    source_directories:
      - "./documents"
    file_patterns:
      - "**/*.txt"
      - "**/*.md"
    recursive: true
    encoding: "utf-8"
    max_file_size_mb: 20

  pipeline:
    auto_index_on_ingest: false
    incremental: false
    backup_previous_output: false
    max_workers: 8

  query:
    default_method: "basic"
    response_type: "Single Paragraph"
    max_context_tokens: 4000
    include_sources: false
    streaming: false
    cache_ttl_seconds: 0

  neo4j:
    uri: "${NEO4J_URI:bolt://localhost:7687}"
    username: "${NEO4J_USERNAME:neo4j}"
    password: "${NEO4J_PASSWORD:password}"
    sync_batch_size: 2000
    sync_create_indexes: false
    store_embeddings: false

  chat_model: "${GRAPHRAG_CHAT_MODEL:gpt-4.1-mini}"
  chat_model_provider: "${GRAPHRAG_CHAT_MODEL_PROVIDER:openai}"
  embedding_model: "${GRAPHRAG_EMBEDDING_MODEL:text-embedding-3-small}"
  embedding_model_provider: "${GRAPHRAG_EMBEDDING_MODEL_PROVIDER:openai}"
  api_key: "${GRAPHRAG_API_KEY}"
  api_base: "${GRAPHRAG_API_BASE:}"

models:
  default_chat_model:
    type: litellm
    model_provider: openai
    model: "${GRAPHRAG_CHAT_MODEL:gpt-4.1-mini}"
    api_key: "${GRAPHRAG_API_KEY}"
    api_base: "${GRAPHRAG_API_BASE:}"
  default_embedding_model:
    type: litellm
    model_provider: openai
    model: "${GRAPHRAG_EMBEDDING_MODEL:text-embedding-3-small}"
    api_key: "${GRAPHRAG_API_KEY}"
    api_base: "${GRAPHRAG_API_BASE:}"

input:
  storage:
    type: file
    base_dir: "input"
  type: text
  encoding: "utf-8"
  file_pattern: ".*\\.txt$"

chunking:
  type: tokens
  encoding_model: cl100k_base
  size: 600
  overlap: 50

output:
  type: file
  base_dir: "output"

cache:
  type: json
  storage:
    type: file
    base_dir: "cache"

reporting:
  type: file
  base_dir: "logs"

vector_store:
  type: milvus
  host: "localhost"
  port: 19530
  collection_name: "graphrag_vectors"
  metric_type: "COSINE"
  index_params:
    index_type: "IVF_FLAT"
    params:
      nlist: 1024

extract_graph:
  model_id: default_chat_model
  prompt: "prompts/extract_graph.txt"
  entity_types:
    - organization
    - person
    - location
  max_gleanings: 0

summarize_descriptions:
  model_id: default_chat_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 300

community_reports:
  model_id: default_chat_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 1000

embed_text:
  model_id: default_embedding_model

cluster_graph:
  max_cluster_size: 5

snapshots:
  graphml: false

local_search:
  prompt: "prompts/local_search.txt"

global_search:
  map_prompt: "prompts/global_search_map.txt"
  reduce_prompt: "prompts/global_search_reduce.txt"

drift_search:
  prompt: "prompts/drift_search.txt"
  reduce_prompt: "prompts/drift_reduce.txt"

basic_search:
  prompt: "prompts/basic_search.txt"
