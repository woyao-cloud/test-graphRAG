version: '3.8'

# Milvus 实战指南 — Demo 运行环境
# 使用方法:
#   docker compose up -d milvus          # 启动 Milvus 基础设施
#   docker compose run --rm ch09-crud    # 运行单个 demo
#   docker compose down -v               # 清理所有数据

services:
  # ============================================================
  # Milvus 基础设施
  # ============================================================
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - milvus-net

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - milvus-net

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.2.11
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - "etcd"
      - "minio"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - milvus-net

  # ============================================================
  # Ch2: 向量基础理论
  # ============================================================
  ch02-vector-basics:
    build:
      context: ./ch02-vector-basics
      dockerfile: Dockerfile
    container_name: milvus-demo-ch02
    working_dir: /app
    volumes:
      - ./ch02-vector-basics:/app
    command: python main.py

  # ============================================================
  # Ch4: Milvus 架构组件演示
  # ============================================================
  ch04-milvus-architecture:
    build:
      context: ./ch04-milvus-architecture
      dockerfile: Dockerfile
    container_name: milvus-demo-ch04
    working_dir: /app
    volumes:
      - ./ch04-milvus-architecture:/app
    command: python main.py

  # ============================================================
  # Ch5: 索引性能对比
  # ============================================================
  ch05-index-performance:
    build:
      context: ./ch05-index-performance
      dockerfile: Dockerfile
    container_name: milvus-demo-ch05
    working_dir: /app
    volumes:
      - ./ch05-index-performance:/app
    depends_on:
      milvus:
        condition: service_healthy
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    command: python main.py

  # ============================================================
  # Ch6: 数据模型设计
  # ============================================================
  ch06-data-model:
    build:
      context: ./ch06-data-model
      dockerfile: Dockerfile
    container_name: milvus-demo-ch06
    working_dir: /app
    volumes:
      - ./ch06-data-model:/app
    depends_on:
      milvus:
        condition: service_healthy
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
