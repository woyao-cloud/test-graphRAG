  # ============================================================
  # Ch7: 混合检索
  # ============================================================
  ch07-hybrid-search:
    build:
      context: ./ch07-hybrid-search
      dockerfile: Dockerfile
    container_name: milvus-demo-ch07
    working_dir: /app
    volumes:
      - ./ch07-hybrid-search:/app
    depends_on:
      milvus:
        condition: service_healthy
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
