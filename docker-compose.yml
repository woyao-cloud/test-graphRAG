# GraphRAG-KG Neo4j Service
# Generated by graphrag-kg init on 2026-07-02T02:26:55.732405+00:00

version: '3.8'

services:
  neo4j:
    image: neo4j:5.22.0
    container_name: graphrag-kg-neo4j
    ports:
      - "7687:7687"   # Bolt
      - "7474:7474"   # HTTP
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
      - NEO4J_server_memory_pagecache_size=1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | cypher-shell -u neo4j -p password || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
