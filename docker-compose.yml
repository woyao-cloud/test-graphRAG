version: '3.8'

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: milvus-etcd
    command: ["etcd", "-advertise-client-urls=http://0.0.0.0:2379", "-listen-client-urls=http://0.0.0.0:2379"]
    volumes:
      - ./volumes/etcd:/etcd-data
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: milvus-minio
    command: ["server", "/minio_data", "--console-address", ":9001"]
    volumes:
      - ./volumes/minio:/minio_data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: milvusadmin
      MINIO_ROOT_PASSWORD: Milvus@123456
      MINIO_ACCESS_KEY: milvusadmin
      MINIO_SECRET_KEY: Milvus@123456
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  standalone:
    image: milvusdb/milvus:v2.6.15
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: milvusadmin
      MINIO_SECRET_KEY: Milvus@123456
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G

  attu:
    image: zilliz/attu:v2.6
    container_name: milvus-attu
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: http://standalone:19530
    depends_on:
      standalone:
        condition: service_healthy

  neo4j:
    image: neo4j:5.22.0
    container_name: graphrag-kg-neo4j
    ports:
      - "7687:7687"   # Bolt
      - "7474:7474"   # HTTP
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
      - NEO4J_server_memory_pagecache_size=1g
    volumes:
      - ./volumes/neo4j_data:/data
      - ./volumes/neo4j_logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | cypher-shell -u neo4j -p password || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped


